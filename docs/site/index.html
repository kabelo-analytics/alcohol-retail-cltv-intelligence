<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alcohol Retail CLTV Intelligence</title>
  <meta name="description" content="Interactive CLTV project site for South African alcohol retail." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700;800&family=Playfair+Display:wght@700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root{--cash:#f5a623;--occasional:#4a90d9;--core:#9b8e7e;--accent:#c8411b;--accentDark:#a33516;--green:#2d7a4f;--teal:#2a7d75;--bg:#fdf8f2;--soft:#fff9f4;--card:#fff;--text:#1a1208;--muted:#7a6e61;--border:#ede8e0}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;background:var(--bg);color:var(--text);font-family:"DM Sans","Segoe UI",sans-serif}
    img{display:block;max-width:100%} a{color:inherit} button{font:inherit}
    .wrap{max-width:1160px;margin:0 auto}.section{padding:78px 22px}.grid{display:grid;gap:20px}.card{background:var(--card);border:1px solid var(--border);border-radius:22px;padding:24px;box-shadow:0 12px 30px rgba(26,18,8,.06)}
    .title{font-family:"Playfair Display",Georgia,serif}.eyebrow{font-size:11px;font-weight:800;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:10px}.muted{color:var(--muted)}
    .nav{position:fixed;inset:0 0 auto 0;z-index:50;padding:14px 22px;display:flex;justify-content:space-between;align-items:center;background:rgba(253,248,242,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--border)}
    .nav-links{display:flex;gap:8px;flex-wrap:wrap}.nav button{border:none;background:transparent;cursor:pointer}.pill{padding:8px 14px;border-radius:999px;background:#fff;border:1px solid var(--border);font-size:13px;font-weight:700}
    .hero{min-height:100vh;padding:110px 22px 70px;background:radial-gradient(circle at top right,rgba(245,166,35,.18),transparent 26%),linear-gradient(145deg,#fdf8f2 0%,#fff2df 58%,#fdf8f2 100%)}
    .hero-grid{display:grid;grid-template-columns:1.25fr .85fr;gap:22px;align-items:end}.stats{display:flex;gap:28px;flex-wrap:wrap}.kpis{grid-template-columns:repeat(auto-fit,minmax(200px,1fr))}
    .split{grid-template-columns:1fr 1fr}.gallery{grid-template-columns:1fr 1fr}.cards3{grid-template-columns:repeat(auto-fit,minmax(260px,1fr))}
    @media (max-width:900px){.hero-grid,.split,.gallery{grid-template-columns:1fr}.nav-links{display:none}}
    @media (max-width:640px){.section,.hero{padding-left:16px;padding-right:16px}.stats{gap:16px}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/recharts/umd/Recharts.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script type="text/babel">
    const {useEffect,useMemo,useRef,useState}=React;
    const {ResponsiveContainer,LineChart,Line,BarChart,Bar,ScatterChart,Scatter,PieChart,Pie,Cell,XAxis,YAxis,CartesianGrid,Tooltip,Legend}=Recharts;
    const C={cash:"#F5A623",occasional:"#4A90D9",core:"#9B8E7E",accent:"#C8411B",accentDark:"#A33516",green:"#2D7A4F",teal:"#2A7D75",bg:"#FDF8F2",soft:"#FFF9F4",card:"#FFFFFF",text:"#1A1208",muted:"#7A6E61",border:"#EDE8E0"};
    const SEGMENTS=[{name:"Cash Cows",count:97,avg:286742,pct:23.1,color:C.cash,tag:"CC"},{name:"Occasional Big Spenders",count:49,avg:258587,pct:11.7,color:C.occasional,tag:"OBS"},{name:"Core / Mid-Tier",count:274,avg:120365,pct:65.2,color:C.core,tag:"CORE"}];
    const TYPE_SEG=[{t:"Tavern","Cash Cows":97,"Occasional Big Spenders":49,"Core / Mid-Tier":36},{t:"Liquor Store","Cash Cows":0,"Occasional Big Spenders":0,"Core / Mid-Tier":120},{t:"Supermarket","Cash Cows":0,"Occasional Big Spenders":0,"Core / Mid-Tier":74},{t:"Bottle Store","Cash Cows":0,"Occasional Big Spenders":0,"Core / Mid-Tier":44}];
    const PROV=[{p:"Limpopo",v:14.56},{p:"Western Cape",v:12.65},{p:"Eastern Cape",v:12.23},{p:"KwaZulu-Natal",v:11.96},{p:"Gauteng",v:11.4},{p:"Free State",v:10.66}];
    const REV=[{m:"Jan '24",v:11.2},{m:"Feb '24",v:9.8},{m:"Mar '24",v:9.1},{m:"Apr '24",v:8.7},{m:"May '24",v:8.3},{m:"Jun '24",v:7.9},{m:"Jul '24",v:7.5},{m:"Aug '24",v:8.1},{m:"Sep '24",v:8.8},{m:"Oct '24",v:9.6},{m:"Nov '24",v:10.8},{m:"Dec '24",v:13.1},{m:"Jan '25",v:12.4},{m:"Feb '25",v:10.2},{m:"Mar '25",v:9.5},{m:"Apr '25",v:8.9},{m:"May '25",v:8.5},{m:"Jun '25",v:8.1},{m:"Jul '25",v:7.8},{m:"Aug '25",v:8.4},{m:"Sep '25",v:9.0},{m:"Oct '25",v:9.9},{m:"Nov '25",v:11.2},{m:"Dec '25",v:13.4}];
    const SCATTER=[{seg:"Cash Cows",city:"Johannesburg",prov:"Gauteng",ot:"Tavern",x:101,y:248,z:302874},{seg:"Cash Cows",city:"Cape Town",prov:"Western Cape",ot:"Tavern",x:95.2,y:255,z:295412},{seg:"Cash Cows",city:"Polokwane",prov:"Limpopo",ot:"Tavern",x:92.3,y:260,z:287586},{seg:"Cash Cows",city:"Thembisa",prov:"Gauteng",ot:"Tavern",x:93.5,y:261,z:289000},{seg:"Occasional Big Spenders",city:"East London",prov:"Eastern Cape",ot:"Tavern",x:14.2,y:620,z:258900},{seg:"Occasional Big Spenders",city:"Tzaneen",prov:"Limpopo",ot:"Tavern",x:12.5,y:648,z:264000},{seg:"Occasional Big Spenders",city:"Kimberley",prov:"Free State",ot:"Tavern",x:16.8,y:595,z:249500},{seg:"Occasional Big Spenders",city:"Richards Bay",prov:"KwaZulu-Natal",ot:"Tavern",x:20.5,y:540,z:239000},{seg:"Core / Mid-Tier",city:"Polokwane",prov:"Limpopo",ot:"Liquor Store",x:47.3,y:179,z:101575},{seg:"Core / Mid-Tier",city:"Mdantsane",prov:"Eastern Cape",ot:"Liquor Store",x:49.3,y:186,z:110299},{seg:"Core / Mid-Tier",city:"Rustenburg",prov:"Gauteng",ot:"Tavern",x:51,y:208,z:121212},{seg:"Core / Mid-Tier",city:"Pretoria",prov:"Gauteng",ot:"Supermarket",x:41.2,y:172,z:95000},{seg:"Core / Mid-Tier",city:"Cape Town",prov:"Western Cape",ot:"Bottle Store",x:35.5,y:190,z:84000},{seg:"Core / Mid-Tier",city:"Bloemfontein",prov:"Free State",ot:"Supermarket",x:38.5,y:169,z:90000}];
    const FIGS=[["Purchase Frequency vs Average Order Value","./fig1_scatter.png"],["CLTV Distribution","./fig2_cltv_dist.png"],["Outlet Type Mix","./fig3_outlet_types.png"],["Provincial Revenue View","./fig4_province_rev.png"],["Average CLTV by Segment","./fig5_avg_cltv.png"]];
    const SECTIONS=["overview","segments","revenue","methodology","gallery","results"];
    const fmtR=(n)=>`R${Number(n).toLocaleString("en-ZA")}`;
    function Counter({to,prefix="",suffix=""}){const [v,setV]=useState(0);const raf=useRef(null);useEffect(()=>{let s;const step=t=>{if(!s)s=t;const p=Math.min((t-s)/1100,1);setV(Math.round((1-Math.pow(1-p,3))*to));if(p<1)raf.current=requestAnimationFrame(step)};raf.current=requestAnimationFrame(step);return()=>cancelAnimationFrame(raf.current)},[to]);return <>{prefix}{v.toLocaleString("en-ZA")}{suffix}</>}
    const Card=({children,style})=><div className="card" style={style}>{children}</div>;
    const Head=({eyebrow,title,sub})=><div style={{marginBottom:36}}><div className="eyebrow">{eyebrow}</div><h2 className="title" style={{fontSize:"clamp(26px,4vw,42px)",lineHeight:1.1,margin:"0 0 12px"}}>{title}</h2><p className="muted" style={{margin:0,maxWidth:760,lineHeight:1.75}}>{sub}</p></div>;
    function Nav({active}){return <nav className="nav"><button onClick={()=>window.scrollTo({top:0,behavior:"smooth"})} style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:20,fontWeight:900,color:C.text}}>CLTV <span style={{color:C.accent}}>Intelligence</span></button><div className="nav-links">{SECTIONS.map(id=><button key={id} className="pill" onClick={()=>document.getElementById(id)?.scrollIntoView({behavior:"smooth"})} style={{background:active===id?C.accent:"#fff",color:active===id?"#fff":C.muted,borderColor:active===id?C.accent:C.border}}>{id[0].toUpperCase()+id.slice(1)}</button>)}</div></nav>}
    function Hero(){return <section className="hero"><div className="wrap hero-grid"><div><div className="eyebrow" style={{display:"inline-block",padding:"8px 14px",borderRadius:999,background:"rgba(200,65,27,.1)"}}>South African alcohol retail - 420 outlets - 6 provinces</div><h1 className="title" style={{fontSize:"clamp(38px,6vw,72px)",lineHeight:1.02,margin:"22px 0"}}>Who are your <span style={{color:C.accent}}>most valuable</span> outlets, really?</h1><p className="muted" style={{fontSize:17,lineHeight:1.8,maxWidth:660,margin:"0 0 28px"}}>This single HTML page embeds the project JSX directly and loads React, Recharts, Babel, and Google Fonts from CDNs so it works immediately in a browser with no build step.</p><div style={{display:"flex",flexWrap:"wrap",gap:10,marginBottom:30}}>{["React from CDN","Recharts from CDN","No npm required","GitHub Pages ready"].map(t=><span key={t} className="pill">{t}</span>)}</div><div className="stats">{[{v:"23%",l:"of outlets are Cash Cows"},{v:"R286k",l:"avg Cash Cow CLTV"},{v:"2.4x",l:"vs Core / Mid-Tier"}].map(i=><div key={i.l}><div className="title" style={{fontSize:46,lineHeight:1,color:C.accent}}>{i.v}</div><div className="muted" style={{fontSize:13,fontWeight:700,marginTop:6}}>{i.l}</div></div>)}</div></div><Card style={{background:"linear-gradient(180deg,rgba(255,255,255,.96),rgba(255,249,244,.98))"}}><div className="eyebrow">Commercial summary</div><div className="grid">{["Cash Cows are concentrated in taverns and deserve protected coverage.","Occasional Big Spenders need timing and reactivation, not blanket spend.","Core / Mid-Tier outlets offer scale if frequency can be nudged up."].map(t=><div key={t} style={{display:"flex",gap:12,alignItems:"flex-start"}}><div style={{width:10,height:10,borderRadius:"50%",background:C.cash,marginTop:6,flexShrink:0}}></div><div className="muted" style={{lineHeight:1.65}}>{t}</div></div>)}</div><div style={{marginTop:18,padding:18,borderRadius:18,background:"linear-gradient(135deg,rgba(200,65,27,.96),rgba(163,53,22,.96))",color:"#fff"}}><div className="eyebrow" style={{color:"rgba(255,255,255,.78)"}}>Project output</div><div className="title" style={{fontSize:28,marginBottom:8}}>Dashboard, model, and story</div><div style={{lineHeight:1.7,fontSize:14.5,color:"rgba(255,255,255,.9)"}}>Interactive charts sit alongside the repository PNG exports so visitors can see both the live presentation and the original artifacts.</div></div></Card></div></section>}
    function Overview(){return <section id="overview" className="section"><div className="wrap"><Head eyebrow="The problem" title="Retention spend was going everywhere. This framework makes it directional." sub="Instead of treating every outlet as equally valuable, the project isolates where long-term commercial value lives and turns that into practical CRM and field-sales action." /><div className="grid kpis" style={{marginBottom:22}}><Kpi label="Total outlets" value={420} color={C.cash} sub="Across 6 provinces" /><Kpi label="Cash Cow outlets" value={97} color={C.accent} sub="23.1% of the base" /><Kpi label="Avg Cash Cow CLTV" value={286742} prefix="R" color={C.occasional} sub="vs R120k Core / Mid-Tier" /><Kpi label="Outlet types" value={4} color={C.green} sub="Tavern, liquor, bottle, supermarket" /></div><div className="grid split"><ListCard title="Before this work" items={["Campaign decisions leaned on short-term sales volume.","Retention budget was spread too evenly across outlets.","High-value repeat buyers and one-off spikes were blended together.","Rep coverage was not tied to where long-term value lived."]} marker="X" markerColor={C.accent} /><ListCard title="What changed" items={["A CLTV score exists for every outlet and can support weekly planning.","Three segments now map directly to campaign and coverage decisions.","The output is explainable to non-technical stakeholders.","Dashboard visuals make the trade-offs easy to grasp."]} marker="OK" markerColor={C.green} /></div></div></section>}
    function Kpi({label,value,prefix="",suffix="",sub,color}){return <Card style={{borderTop:`5px solid ${color}`}}><div className="eyebrow" style={{color:C.muted,marginBottom:10}}>{label}</div><div className="title" style={{fontSize:34,lineHeight:1}}><Counter to={value} prefix={prefix} suffix={suffix} /></div><div className="muted" style={{marginTop:8,fontSize:13}}>{sub}</div></Card>}
    function ListCard({title,items,marker,markerColor}){return <Card><div className="title" style={{fontSize:22,marginBottom:14}}>{title}</div>{items.map(t=><div key={t} style={{display:"flex",gap:12,marginBottom:12,color:C.muted,lineHeight:1.65}}><strong style={{color:markerColor}}>{marker}</strong><span>{t}</span></div>)}</Card>}
    function Tip({active,payload,label}){if(!active||!payload?.length)return null;return <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:"10px 14px",boxShadow:"0 12px 28px rgba(26,18,8,.12)",fontSize:13}}>{label&&<div style={{fontWeight:700,marginBottom:6}}>{label}</div>}{payload.map((p,i)=><div key={i} style={{color:p.color||C.muted,marginBottom:4}}>{p.name}: <strong>{typeof p.value==="number"&&p.value>500?fmtR(p.value):p.value}</strong></div>)}</div>}
    function Segments(){const [filter,setFilter]=useState("All");const data=useMemo(()=>filter==="All"?SCATTER:SCATTER.filter(d=>d.seg===filter),[filter]);const desc={"Cash Cows":"Tavern-heavy, high-frequency buyers that justify protected investment.","Occasional Big Spenders":"Large baskets with low visit count, ideal for reactivation plays.","Core / Mid-Tier":"The biggest group in the network and the clearest scale opportunity."};return <section id="segments" className="section" style={{background:C.soft}}><div className="wrap"><Head eyebrow="Customer segmentation" title="Three segments, three very different commercial stories." sub="The segmentation is simple enough to use in planning and specific enough to guide budget, campaign design, and rep coverage." /><div className="grid cards3" style={{marginBottom:22}}>{SEGMENTS.map(s=><Card key={s.name} style={{borderTop:`5px solid ${s.color}`}}><div style={{display:"inline-flex",width:48,height:48,borderRadius:14,alignItems:"center",justifyContent:"center",background:`${s.color}18`,color:s.color,fontWeight:900,letterSpacing:".08em",marginBottom:14}}>{s.tag}</div><div className="title" style={{fontSize:24,marginBottom:6}}>{s.name}</div><div className="title" style={{fontSize:34,color:s.color,marginBottom:8}}>{fmtR(s.avg)}</div><div className="muted" style={{fontSize:13,marginBottom:12}}>Avg CLTV - {s.count} outlets - {s.pct}% of network</div><div className="muted" style={{lineHeight:1.7,fontSize:14}}>{desc[s.name]}</div></Card>)}</div><div className="grid split" style={{marginBottom:22}}><Card><div style={{fontWeight:800,fontSize:16,marginBottom:12}}>Outlet distribution</div><ResponsiveContainer width="100%" height={260}><PieChart><Pie data={SEGMENTS} dataKey="count" nameKey="name" innerRadius={60} outerRadius={102} paddingAngle={3}>{SEGMENTS.map(s=><Cell key={s.name} fill={s.color} />)}</Pie><Tooltip formatter={(v,n)=>[`${v} outlets`,n]} /><Legend formatter={v=><span style={{color:C.muted,fontSize:12}}>{v}</span>} /></PieChart></ResponsiveContainer></Card><Card><div style={{fontWeight:800,fontSize:16,marginBottom:12}}>Average CLTV by segment</div><ResponsiveContainer width="100%" height={260}><BarChart data={SEGMENTS} layout="vertical" barSize={26}><CartesianGrid strokeDasharray="3 3" stroke="#f0ede8" horizontal={false} /><XAxis type="number" tickFormatter={v=>`R${Math.round(v/1000)}k`} tick={{fontSize:11,fill:C.muted}} /><YAxis type="category" dataKey="name" width={170} tick={{fontSize:11,fill:C.muted}} /><Tooltip content={<Tip />} /><Bar dataKey="avg" name="Avg CLTV" radius={[0,10,10,0]}>{SEGMENTS.map(s=><Cell key={s.name} fill={s.color} />)}</Bar></BarChart></ResponsiveContainer></Card></div><Card style={{marginBottom:22}}><div style={{fontWeight:800,fontSize:16,marginBottom:12}}>Segment distribution by outlet type</div><ResponsiveContainer width="100%" height={280}><BarChart data={TYPE_SEG} barSize={22}><CartesianGrid strokeDasharray="3 3" stroke="#f0ede8" vertical={false} /><XAxis dataKey="t" tick={{fontSize:12,fill:C.muted}} /><YAxis tick={{fontSize:11,fill:C.muted}} /><Tooltip content={<Tip />} /><Legend formatter={v=><span style={{color:C.muted,fontSize:12}}>{v}</span>} /><Bar dataKey="Cash Cows" fill={C.cash} radius={[6,6,0,0]} /><Bar dataKey="Occasional Big Spenders" fill={C.occasional} radius={[6,6,0,0]} /><Bar dataKey="Core / Mid-Tier" fill={C.core} radius={[6,6,0,0]} /></BarChart></ResponsiveContainer></Card><Card><div style={{display:"flex",justifyContent:"space-between",gap:12,flexWrap:"wrap",marginBottom:14}}><div><div style={{fontWeight:800,fontSize:16,marginBottom:4}}>Purchase frequency vs average order value</div><div className="muted" style={{fontSize:12.5}}>Hover the points to inspect city, outlet type, AOV, and CLTV.</div></div><div style={{display:"flex",gap:8,flexWrap:"wrap"}}>{["All",...SEGMENTS.map(s=>s.name)].map(label=><button key={label} onClick={()=>setFilter(label)} className="pill" style={{background:filter===label?C.accent:"#f5f0eb",color:filter===label?"#fff":C.muted,borderColor:filter===label?C.accent:"#f5f0eb"}}>{label==="All"?"All":label.split(" ")[0]}</button>)}</div></div><ResponsiveContainer width="100%" height={360}><ScatterChart><CartesianGrid strokeDasharray="3 3" stroke="#f0ede8" /><XAxis dataKey="x" type="number" domain={[0,120]} tick={{fontSize:11,fill:C.muted}} label={{value:"Monthly tickets",position:"insideBottom",offset:-2,style:{fill:C.muted,fontSize:11}}} /><YAxis dataKey="y" type="number" domain={[0,720]} tickFormatter={v=>`R${v}`} tick={{fontSize:11,fill:C.muted}} /><Tooltip cursor={{strokeDasharray:"3 3"}} content={({active,payload})=>{if(!active||!payload?.length)return null;const d=payload[0].payload;return <div style={{background:"#fff",border:`1px solid ${C.border}`,borderRadius:14,padding:"12px 16px",boxShadow:"0 12px 28px rgba(26,18,8,.12)",fontSize:13}}><div style={{fontWeight:700,marginBottom:6}}>{d.city}, {d.prov}</div><div style={{color:SEGMENTS.find(s=>s.name===d.seg)?.color,fontWeight:700,marginBottom:4}}>{d.seg}</div><div className="muted">Type: {d.ot}</div><div className="muted">Freq: <strong>{d.x}x / month</strong></div><div className="muted">AOV: <strong>{fmtR(d.y)}</strong></div><div className="muted">CLTV: <strong>{fmtR(d.z)}</strong></div></div>}} />{SEGMENTS.map(s=>{const pts=data.filter(d=>d.seg===s.name);return pts.length?<Scatter key={s.name} name={s.name} data={pts} fill={s.color} fillOpacity={.78} />:null})}<Legend formatter={v=><span style={{color:C.muted,fontSize:12}}>{v}</span>} /></ScatterChart></ResponsiveContainer></Card></div></section>}
    function Revenue(){return <section id="revenue" className="section"><div className="wrap"><Head eyebrow="Revenue and geography" title="Seasonality is predictable. The provincial story is actionable." sub="December and January peaks repeat reliably, while the provincial mix shows where high-value outlet clusters are concentrated." /><Card style={{marginBottom:22}}><div style={{fontWeight:800,fontSize:16,marginBottom:12}}>24-month revenue trend</div><ResponsiveContainer width="100%" height={300}><LineChart data={REV}><CartesianGrid strokeDasharray="3 3" stroke="#f0ede8" /><XAxis dataKey="m" interval={2} tick={{fontSize:10,fill:C.muted}} /><YAxis tickFormatter={v=>`R${v}M`} tick={{fontSize:11,fill:C.muted}} domain={[6,15]} /><Tooltip formatter={v=>[`R${v}M`,"Revenue"]} /><Line type="monotone" dataKey="v" stroke={C.accent} strokeWidth={3} dot={{r:3,fill:C.accent}} activeDot={{r:7,fill:C.accentDark}} /></LineChart></ResponsiveContainer></Card><div className="grid split"><Card><div style={{fontWeight:800,fontSize:16,marginBottom:12}}>Revenue by province</div><ResponsiveContainer width="100%" height={280}><BarChart data={PROV} layout="vertical" barSize={24}><CartesianGrid strokeDasharray="3 3" stroke="#f0ede8" horizontal={false} /><XAxis type="number" tickFormatter={v=>`R${v}M`} tick={{fontSize:11,fill:C.muted}} /><YAxis type="category" dataKey="p" width={118} tick={{fontSize:11.5,fill:C.muted}} /><Tooltip formatter={v=>[`R${v}M`,"Revenue"]} /><Bar dataKey="v" fill={C.accent} radius={[0,10,10,0]} /></BarChart></ResponsiveContainer></Card><Card><div style={{fontWeight:800,fontSize:16,marginBottom:16}}>What the provincial data suggests</div>{[{p:"Limpopo",n:"Highest revenue province and a strong home for Cash Cow taverns.",c:C.cash},{p:"Western Cape",n:"Strong performance with a broader outlet mix, including off-trade channels.",c:C.occasional},{p:"Eastern Cape",n:"Good scale and room to grow if purchase frequency improves.",c:C.core},{p:"Gauteng",n:"Dense urban coverage with more supermarket exposure and a different playbook.",c:C.green}].map(i=><div key={i.p} style={{display:"flex",gap:14,marginBottom:18}}><div style={{width:6,borderRadius:999,background:i.c,minHeight:42,flexShrink:0}}></div><div><div style={{fontWeight:700,fontSize:14,marginBottom:4}}>{i.p}</div><div className="muted" style={{fontSize:13.5,lineHeight:1.6}}>{i.n}</div></div></div>)}</Card></div></div></section>}
    function Methodology(){return <section id="methodology" className="section" style={{background:C.soft}}><div className="wrap"><Head eyebrow="Methodology" title="Built to be explainable, not just accurate." sub="The project is designed around commercial usability. Every modeling choice needed to land cleanly in a sales, CRM, or leadership conversation." /><div className="grid cards3">{[{n:"01",t:"Data generation and preparation",d:"Synthetic transactions mirror seasonality, outlet-type behavior, and provincial variation.",c:C.cash},{n:"02",t:"Feature engineering",d:"Recency, frequency, monetary value, tickets per month, AOV, and months active were computed per outlet.",c:C.teal},{n:"03",t:"CLTV modeling",d:"The proxy balances frequency, revenue, and retention logic in a commercially interpretable way.",c:C.occasional},{n:"04",t:"Segmentation",d:"Scores were grouped into Cash Cows, Occasional Big Spenders, and Core / Mid-Tier.",c:C.accent},{n:"05",t:"Dashboard delivery",d:"Outputs were shaped into visuals that support weekly planning, not only analysis notebooks.",c:C.green}].map(s=><Card key={s.n} style={{borderLeft:`5px solid ${s.c}`}}><div style={{display:"inline-flex",width:42,height:42,borderRadius:"50%",alignItems:"center",justifyContent:"center",background:s.c,color:"#fff",fontWeight:900,marginBottom:14}}>{s.n}</div><div className="title" style={{fontSize:20,marginBottom:8}}>{s.t}</div><div className="muted" style={{lineHeight:1.7,fontSize:14.5}}>{s.d}</div></Card>)}</div><Card style={{marginTop:22,borderLeft:`6px solid ${C.accent}`}}><div className="title" style={{fontSize:22,marginBottom:10}}>A note on the data</div><div className="muted" style={{lineHeight:1.8}}>The dataset is fully synthetic. It demonstrates the workflow, segmentation logic, and communication design without exposing any real commercial data.</div></Card></div></section>}
    function Gallery(){return <section id="gallery" className="section"><div className="wrap"><Head eyebrow="Project assets" title="Original chart exports from the repository" sub="These PNGs are copied into docs/site so the published GitHub Pages site can load them directly from the same folder." /><div className="grid gallery">{FIGS.map(([title,src])=><Card key={src} style={{padding:0,overflow:"hidden"}}><div style={{padding:"20px 20px 12px"}}><div className="title" style={{fontSize:22,marginBottom:4}}>{title}</div><div className="muted" style={{fontSize:13.5}}>Static export included alongside the live charts</div></div><div style={{padding:"0 16px 16px"}}><img src={src} alt={title} style={{width:"100%",borderRadius:16,border:`1px solid ${C.border}`}} /></div></Card>)}</div></div></section>}
    function Results(){return <section id="results" className="section" style={{background:C.soft}}><div className="wrap"><Head eyebrow="Results" title="What this project makes easier for a commercial team" sub="The value is not only the model output. It is the shared language and repeatable decision-making that the output enables." /><div className="grid cards3" style={{marginBottom:22}}>{[{s:"97",l:"Cash Cow outlets identified",d:"A minority of the network but a disproportionate share of value."},{s:"R286k",l:"Average Cash Cow CLTV",d:"Large enough to justify differentiated retention and service levels."},{s:"100%",l:"Cash Cows found in taverns",d:"A strong signal that channel strategy matters, not just account size."}].map(i=><Card key={i.l}><div className="title" style={{fontSize:38,color:C.accent,marginBottom:10}}>{i.s}</div><div style={{fontWeight:800,fontSize:14,marginBottom:10}}>{i.l}</div><div className="muted" style={{fontSize:13.5,lineHeight:1.65}}>{i.d}</div></Card>)}</div><div className="grid split"><Card><div className="title" style={{fontSize:24,marginBottom:16}}>What comes next</div>{["Track campaign response by segment so retention investment can be measured.","Test product affinity and offer design inside tavern-heavy clusters.","Review thresholds quarterly as outlet behavior changes over time.","Map segments to rep territories to expose under-served high-value pockets."].map(t=><div key={t} style={{display:"flex",gap:12,marginBottom:14,color:C.muted,lineHeight:1.65}}><div style={{width:8,height:8,borderRadius:"50%",background:C.accent,marginTop:8,flexShrink:0}}></div><span>{t}</span></div>)}</Card><div style={{borderRadius:24,padding:28,background:"linear-gradient(135deg,rgba(200,65,27,.98),rgba(163,53,22,.98))",color:"#fff",display:"flex",flexDirection:"column",justifyContent:"space-between",gap:18}}><div><div className="title" style={{fontSize:30,marginBottom:14}}>Built by Kabelo Makua</div><p style={{margin:0,lineHeight:1.8,fontSize:14.5,color:"rgba(255,255,255,.9)"}}>This page turns the repository into a portfolio-ready project site that anyone can open directly in a browser. The HTML, JSX, and CDN-loaded libraries all live in one document.</p></div><div style={{display:"flex",flexWrap:"wrap",gap:12}}>{[{l:"GitHub Repo",h:"https://github.com/kabelo-analytics/alcohol-retail-cltv-intelligence"},{l:"Published Site",h:"https://kabelo-analytics.github.io/alcohol-retail-cltv-intelligence/site/"}].map(a=><a key={a.l} href={a.h} target="_blank" rel="noreferrer" className="pill" style={{textDecoration:"none",background:"rgba(255,255,255,.14)",borderColor:"rgba(255,255,255,.28)",color:"#fff"}}>{a.l}</a>)}</div></div></div></div></section>}
    function App(){const [active,setActive]=useState("overview");useEffect(()=>{const os=[];SECTIONS.forEach(id=>{const el=document.getElementById(id);if(!el)return;const o=new IntersectionObserver(([e])=>e.isIntersecting&&setActive(id),{rootMargin:"-40% 0px -45% 0px"});o.observe(el);os.push(o)});return()=>os.forEach(o=>o.disconnect())},[]);return <><Nav active={active} /><Hero /><Overview /><Segments /><Revenue /><Methodology /><Gallery /><Results /><footer style={{textAlign:"center",padding:"28px 16px 40px",borderTop:`1px solid ${C.border}`,color:C.muted,fontSize:12.5}}>Copyright 2026 Kabelo Makua - CLTV Intelligence - Synthetic dataset - GitHub Pages project site</footer></>}
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
