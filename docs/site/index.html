// â”€â”€â”€ ANIMATED COUNTER â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
function Counter({ to, prefix = "", suffix = "", duration = 1200 }) {
  const [val, setVal] = useState(0);
  const raf = useRef(null);
  const t0 = useRef(null);
  useEffect(() => {
    t0.current = null;
    const step = (ts) => {
      if (!t0.current) t0.current = ts;
      const p = Math.min((ts - t0.current) / duration, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      setVal(Math.round(ease * to));
      if (p < 1) raf.current = requestAnimationFrame(step);
    };
    raf.current = requestAnimationFrame(step);
    return () => cancelAnimationFrame(raf.current);
  }, [to]);
  return <>{prefix}{val.toLocaleString("en-ZA")}{suffix}</>;
}

function App() {
  const [activeSection, setActiveSection] = useState("overview");

  useEffect(() => {
    const observers = [];
    SECTIONS.forEach(id => {
      const el = document.getElementById(id);
      if (!el) return;
      const obs = new IntersectionObserver(
        ([entry]) => { if (entry.isIntersecting) setActiveSection(id); },
        { rootMargin:"-40% 0px -40% 0px", threshold:0 }
      );
      obs.observe(el);
      observers.push(obs);
    });
    return () => observers.forEach(o => o.disconnect());
  }, []);

  return (
    <div style={{fontFamily:"'DM Sans','Segoe UI',sans-serif",background:C.bg,color:C.text}}>

        ::-webkit-scrollbar-thumb{background:#D4A017;border-radius:3px}
      `}</style>

      <Revenue />

        Â© 2026 Kabelo Makua Â· CLTV Intelligence Â· Synthetic dataset Â· Portfolio project
      </footer>
    </div>
  );
}
